# 构建 n8n 中文语言包（fork 定制版）
# 手动触发，构建指定版本的 n8n editor-ui 中文包

name: Build Chinese Language Package

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n 版本标签 (如 release/2.28.2)'
        required: true
        default: 'release/2.28.2'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    environment: test
    strategy:
      matrix:
        node-version: [22.x]
    steps:
    - name: Install pnpm
      run: npm install -g pnpm@10

    - name: Checkout local
      uses: actions/checkout@v4
      with:
        path: ./n8n-i18n-chinese

    - name: Install dependencies and translate
      run: pnpm install && node --input-type=module translate.js
      working-directory: /home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n-i18n-chinese/script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE }}
        OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        OPENAI_API_CONCURRENT: ${{ vars.OPENAI_API_CONCURRENT }}
        REASONING_EFFORT: ${{ vars.REASONING_EFFORT }}
        ENABLE_THINKING: ${{ vars.ENABLE_THINKING }}
        N8N_VERSION: ${{ inputs.n8n_version }}

    - name: Checkout n8n ${{ inputs.n8n_version }}
      uses: actions/checkout@v4
      with:
        repository: n8n-io/n8n
        ref: ${{ inputs.n8n_version }}
        path: ./n8n

    - uses: actions/setup-node@v4.2.0
      with:
        node-version: 22.x

    - name: Set pnpm resolution mode
      run: echo "resolution-mode=highest" >> /home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n/.npmrc

    - name: Install n8n dependencies
      run: pnpm install --frozen-lockfile
      working-directory: /home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n

    - name: Check n8n editor-ui directory structure
      id: editorui_dir
      run: |
        DIR_PATH="/home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n/packages/frontend/editor-ui"
        FALLBACK_DIR="/home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n/packages/editor-ui"
        if [ -d "$DIR_PATH" ]; then
          echo "flag=new" >> $GITHUB_OUTPUT
          echo "dir=$DIR_PATH" >> $GITHUB_OUTPUT
        else
          echo "flag=old" >> $GITHUB_OUTPUT
          echo "dir=$FALLBACK_DIR" >> $GITHUB_OUTPUT
        fi

    - name: Copy zh-CN translations to n8n source
      run: |
        cp -r /home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n-i18n-chinese/languages/* \
          "/home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n/packages/frontend/@n8n/i18n/src/locales/"

    - name: Patch I18n to register zh-CN locale
      if: steps.editorui_dir.outputs.flag == 'new'
      run: |
        git apply /home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n-i18n-chinese/patches/feat__i18n_zhCn.patch
        echo "==== Patched index.ts ===="
        head -n 30 /home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n/packages/frontend/@n8n/i18n/src/index.ts
      working-directory: /home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n

    - name: Build editor-ui
      run: |
        pnpm run build:n8n || echo "Build had issues, checking dist..."
        if [ -d "${{ steps.editorui_dir.outputs.dir }}/dist" ]; then
          echo "Build successful - dist directory exists"
        else
          echo "Build failed - dist directory not found"
          exit 1
        fi
      working-directory: /home/runner/work/n8n-i18n-chinese/n8n-i18n-chinese/n8n

    - name: Package dist as editor-ui.tar.gz
      run: tar -czvf editor-ui.tar.gz dist
      working-directory: ${{ steps.editorui_dir.outputs.dir }}

    - name: Upload editor-ui artifact
      uses: actions/upload-artifact@v4
      with:
        name: editor-ui-${{ inputs.n8n_version }}
        path: ${{ steps.editorui_dir.outputs.dir }}/editor-ui.tar.gz
